    # 远古轰魔的护甲值系数。 
    # 太古・母神魔の防御値の係数。 [range: 0.01 ~ 100.0, default: 1.0]
    S:"Ancient Matriarch Armor Multiplier"=1.0

    # Damage of its bomb [range: 1.0 ~ 1000.0, default: 12.0]
    S:"Ancient Matriarch Bomb Damage"=12.0

    # Damage multiplier for Ancient Matriarch. 
    # 远古轰魔的伤害值系数。 
    # 太古・母神魔のダメージ値の係数。 [range: 0.01 ~ 100.0, default: 1.0]
    S:"Ancient Matriarch Damage Multiplier"=1.0

    # Set to false if you want to disable Ancient Matriarch. 
    # 启用远古轰魔。 
    # エネーブル太古・母神魔。 [default: true]
    B:"Ancient Matriarch Enabled"=true

    # Explotion damage will take base Damage and multiply it by this value. [range: 1.0 ~ 100.0, default: 6.0]
    S:"Ancient Matriarch Explotion Multiplier"=6.0

    # Number of blocks it can fly above the ground for Ancient Matriarch. [range: 0 ~ 256, default: 256]
    I:"Ancient Matriarch Flight Height Limit"=256

    # Set to true if you want the Ancient Matriarch to destroy blocks on explosion. [default: true]
    B:"Ancient Matriarch Griefing"=true

    # Health multiplier for Ancient Matriarch. 
    # 远古轰魔的生命值系数。 
    # 太古・母神魔の健康値の係数。 [range: 0.01 ~ 100.0, default: 1.0]
    S:"Ancient Matriarch Health Multiplier"=1.0

    # Knockback Resistance multiplier for Ancient Matriarch. 
    # 远古轰魔的抗击退系数。 
    # 太古・母神魔のノックバック係数。 [range: 0.01 ~ 100.0, default: 1.0]
    S:"Ancient Matriarch Knockback Resistance Multiplier"=1.0

    # Items you want the Ancient Matriarch to drop. Ex. "minecraft:end_crystal;100;1;3;false" 
    # 妳想让远古轰魔掉落的物品。 例如："minecraft:end_crystal;100;1;3;false" 
    # 太古・母神魔にドロップさせたいアイテム。 例えば："minecraft:end_crystal;100;1;3;false" 
    #  Where: 
    #  此处： 
    #  ここは： 
    #  "minecraft:end_crystal" is the item, 
    #  "minecraft:end_crystal" 是物品， 
    #  "minecraft:end_crystal" はアイテムです。 
    #  "100" is the chance to drop, 
    #  "100" 是掉落几率, 
    #  "100" はドロップするチャンスです。 
    #  "1" is the min number of items, 
    #  "1" 是物品的最小掉落数， 
    #  "1" はアイテムの最小数です， 
    #  "3" is the max number of items, 
    #  "3" 是物品的最大掉落数， 
    #  "3" はアイテムの最大数です， 
    #  "true" is for the item to always roll, if false the item will be unique and only 1 will be choosen. 
    #  "true" 意味着物品一直可能掉落，如果为 false 则此独特物品掉落时只有自己。 
    #  "true" はアイテムが常にロールするためであり、falseの場合、アイテムは一意になり、1つだけが選択されます。 
    #  [default: ]
    S:"Ancient Matriarch Loot Table" <
     >

    # Mob list for Ancient Matriarch. Ex. "minecraft:zombie;4;2" Where: 
    #  "minecraft:zombie" is the entity, 
    #  "4" is the maximum number of entities, 
    #  "2" is the minimum number of entities. 
    #  [default: [srparasites:bomber_heavy], [srparasites:wraith], [srparasites:bogle], [srparasites:haunter], [srparasites:carrier_colony], [srparasites:aesthete]]
    S:"Ancient Matriarch Mob Table" <
        srparasites:bomber_heavy
        srparasites:wraith
        srparasites:bogle
        srparasites:haunter
        srparasites:carrier_colony
        srparasites:aesthete
     >

    # Orb effects  Ex. "0;60;2;minecraft:fire_resistance;4;3" Where: 
    #  "0" mode of applying, 0 to non parasite mobs, 1 to self, 2 to parasite mobs, 
    #  "60" potion duration in seconds, 
    #  "2" potion amplifier, 
    #  "minecraft:fire_resistance" potion itself, 
    #  "4" if != 0 then amplifier += (mobs inside the orb / this value), 
    #  "3" if != 0 then amplifier += (mobs inside the orb / this value) * 20. 
    #  [default: [0;30;4;minecraft:hunger;0;0], [0;240;4;srparasites:needler;0;0], [0;30;4;minecraft:mining_fatigue;0;0], [0;20;4;minecraft:wither;0;0]]
    S:"Ancient Matriarch Orb Effects" <
        0;30;4;minecraft:hunger;0;0
        0;240;4;srparasites:needler;0;0
        0;30;4;minecraft:mining_fatigue;0;0
        0;20;4;minecraft:wither;0;0
     >
}


