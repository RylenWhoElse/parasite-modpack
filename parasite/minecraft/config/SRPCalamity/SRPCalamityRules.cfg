# Configuration file

##########################################################################################################
# blockspawn
#--------------------------------------------------------------------------------------------------------#
# Block Spawns
##########################################################################################################

blockspawn {
    # Break Hijacked Blocks without Silk Harvest to spawn Gnats
    # 在不使用采集精准的情况下，被劫持的方块将产生狂疫蚋。 [default: true]
    B:"Break Hijacked Block to Spawn Gnats"=true

    # Chance(1 = 0.01%).
    # 爆裂几率（单位：万分之一(‱)）
    # 確率（単位：10,000分の1(‱)） [range: 0 ~ 10000, default: 12]
    I:"Hijacked Iron Pressure Plate "=12

    # If you set true last & this,Hijacked Iron Pressure Plate will be cracked and release Plenty of Gnats while being pressed
    # 在允许上一条的前提下，踩踏被劫持的铁压力板有几率爆裂，并产生狂疫蚋。
    # 前のものが許可されている場合、ハイジャックされた鉄の感圧板を踏むと、破裂してブヨを生成する可能性があります。 [default: true]
    B:"Hijacked Iron Pressure Plate can be cracked to Spawn Gnats"=true
}


