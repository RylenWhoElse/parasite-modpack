##########################################################################################################
# hj_mutant_skeleton
#--------------------------------------------------------------------------------------------------------#
# Hijacked Mutant Skeleton
##########################################################################################################

hj_mutant_skeleton {
    # Set to false if you want to disable entity. [default: true]
    B:" Active"=true

    # Armor. [range: 0.0 ~ 999999.0, default: 8.0]
    S:"# Armor"=8.0

    # Armor Toughness. [range: 0.0 ~ 999999.0, default: 1.0]
    S:"# Armor Toughness"=1.0

    # Attack damage (melee). [range: 0.0 ~ 999999.0, default: 15.0]
    S:"# Attack Damage"=15.0

    # Follow range. [range: 0.0 ~ 128.0, default: 58.0]
    S:"# Follow Range"=58.0

    # Health. [range: 0.0 ~ 999999.0, default: 170.0]
    S:"# Health"=170.0

    # Knockback resistance. [range: 0.0 ~ 999999.0, default: 3.0]
    S:"# Knockback Resistance"=3.0

    # Movement speed. [range: 0.0 ~ 99.0, default: 0.33]
    S:"# Movement Speed"=0.33

    # How many points parasites will lose when it is killed. [range: 0 ~ 1000000000, default: 200]
    I:"$ Death Penalty Evolution Value"=200

    # The entity can naturally despawn. [default: true]
    B:"$ Despawn"=true

    # Loot TableEx. "100;minecraft:nether_star;0;5;1" Where:  
    #  "100" is the chance to drop (100%), 
    #  "minecraft:nether_star" is the item, 
    #  "0" is the meta of items, 
    #  "5" is the max number of items, 
    #  "1" is the min number of items  
    #  [default: ]
    S:"$ Loot Table" <
     >

    # Minimum Damage. [range: 0.0 ~ 1024.0, default: 1.5]
    S:"$ Minimum Damage"=1.5

    # Total number of assimilation's required to spawn naturally. [range: -1 ~ 999999, default: 3]
    I:"$ Needed Assimilation Value"=3

    # Death value set in EntityParasiticScent, used if parasite_collective_consciousness is enabled. [range: 1 ~ 1000, default: 60]
    I:"$ Scent Death Value"=60

    # XP value. [range: 0 ~ 999999, default: 100]
    I:"$ XPValue"=100

    # Maximum amount of food to be contaminated. [range: 0 ~ 1000000000, default: 3]
    I:"$M Food Item Amount"=3

    # Chance (1 = 100%) of contaminating food when hitting you. [range: 0.0 ~ 1.0, default: 0.15]
    S:"$M Food Item Chance"=0.15

    # Will increase exhaustion level by this value when it hits you. [range: 0.0 ~ 100.0, default: 0.2]
    S:"$M Food Steal"=0.2

    # Cooldown (seconds) added to items by their orb. [range: 0 ~ 1000000000, default: 10]
    I:"$M Item Orb Cooldown"=10

    # Minimum number of hits to kill a Parasite. [range: 1 ~ 100, default: 1]
    I:"$M MinHitCap"=1

    # Cap of points used to reduce damage taken. [range: 0 ~ 100, default: 10]
    I:"$M Point Cap"=10

    # Chance to fail adaptation if its on fire (1 = 100%). [range: 0.0 ~ 1.0, default: 0.05]
    S:"$M Point Chance to Fail"=0.05

    # Chance to adapt (1 = 100%) to the damage. [range: 0.0 ~ 1.0, default: 0.2]
    S:"$M Point Chance to Learn"=0.2

    # How many damage types the version can learn and adapt. [range: 0 ~ 1000, default: 8]
    I:"$M Point Reduction Total Cap"=8

    # Value for each point, used to reduce damage taken. [range: 0.0 ~ 100.0, default: 0.1]
    S:"$M Point Reduction Value"=0.1

    # How much they will heal if not in combat. [range: 0.0 ~ 1024.0, default: 0.3]
    S:"$M Regen"=0.3

    # List of creatures that will appear after the deathEx. "50;minecraft:zombie;5;1" Where:  
    #  "50" it's a chance to create an entity (50%), 
    #  "minecraft:zombie" is the entity, 
    #  "5" is the maximum number of entities, 
    #  "1" is a minimum number of entities  
    #  [default: ]
    S:"& List Mobs Inside" <
     >

    # The list of effects that will be applied to the creatures that were spawned after death.Ex. "100;minecraft:speed;5;1;1000;500;true" Where:  
    #  "100" it's a chance to apply an effect (100%), 
    #  "minecraft:speed" is the effect, 
    #  "5" is the maximum level effect, 
    #  "1" is a minimum level effect, 
    #  "1000" Applies the effect of the potion for a maximum of 1000 ticks (50 seconds), 
    #  "500" Applies the effect of the potion for a minimum of 500 ticks (25 seconds), 
    #  "true" effect particle  
    #  [default: ]
    S:"& List of Bonus Effects for Mobs Inside" <
     >

    # Offset Y [range: 0.0 ~ 999.0, default: 1.0]
    S:"& Mobs Inside Offset Y"=1.0

    # Entity creation distance from entity center. [range: 0.0 ~ 999.0, default: 0.3]
    S:"& Mobs Inside Spawn Distance XZ"=0.3

    # Entity creation distance from entity center. [range: 0.0 ~ 999.0, default: 1.0]
    S:"& Mobs Inside Spawn Distance Y"=1.0

    # Max: XZ Velocity. [range: 0.0 ~ 100.0, default: 1.2]
    S:"& Mobs Inside Velocity XZ"=1.2

    # Max: Y Velocity. [range: 0.0 ~ 100.0, default: 1.5]
    S:"& Mobs Inside Velocity Y"=1.5

    # Chance to inherit a weapon. [range: 0.0 ~ 1.0, default: 0.2]
    S:"* Chance Inherit Weapon"=0.2

    # Cooldown between skill uses (If -1, the skill will not be added). [range: -1 ~ 9999999, default: 120]
    I:"@ Cooldown Skill"=120

    # The maximum block hardness a parasite can break with its ability. [range: -1.0 ~ 9999999.0, default: 3.0]
    S:"@ Max Block Hardness"=3.0
}


