# Configuration file

general {
    # Enable asynchronous pathfinding. EXPERIMENTAL — may cause AI glitches.
    B:asyncPathfinding=false

    # Entities to exclude from parallel ticking.
    # You can use full class names OR registry names.
    # These entities will always tick on the main thread.
    # EntityItem is blacklisted by default because Quark hooks it with a WeakHashMap (not thread-safe).
    # Examples:
    #   Class: "net.minecraft.entity.boss.EntityDragon"
    #   Registry Name: "minecraft:ender_dragon"
    S:blacklistedEntities <
        net.minecraft.entity.item.EntityItem
        net.minecraft.entity.item.EntityXPOrb
     >

    # Enable debug logging (entity counts, thread stats per tick).
    B:debugLogging=false

    # Master switch to enable/disable parallel entity ticking.
    B:enabled=true

    # Number of worker threads when threadMode = manual.
    # Recommended: 2-4 for most setups.
    # Min: 1
    # Max: 16
    I:manualThreadCount=3

    # Minimum batch size per worker thread. Too small = thread overhead outweighs benefits.
    # Min: 10
    # Max: 500
    I:minBatchSize=50

    # Minimum number of entities to enable parallel ticking. Below this, main thread is faster.
    # Min: 10
    # Max: 1000
    I:minEntitiesForThreading=100

    # Thread count mode:
    #   auto   = CPU cores / 2 (minimum 2, maximum 4)
    #   manual = Use the exact value from 'manualThreadCount'
    #   max    = Use all available CPU cores minus 1
    S:threadMode=auto
}


